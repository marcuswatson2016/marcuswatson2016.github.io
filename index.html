<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcus Watson</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --black: #080808;
  --gold: #b8bfc4;
  --gold-light: #d4dadd;
  --gold-dim: rgba(184,191,196,0.15);
  --white: #ffffff;
}

html,body{height:100%;overflow-x:hidden}

body {
  font-family:'Inter',sans-serif;
  background:var(--black);
  color:var(--white);
  min-height:100vh;
}

/* ── ANIMATED BACKGROUND ── */
.bg {
  position:fixed;inset:0;z-index:0;overflow:hidden;
}

/* Olympic rings SVG background */
.bg-rings {
  position:absolute;
  bottom:-80px;right:-60px;
  width:520px;height:auto;
  opacity:0.04;
  animation:slowspin 120s linear infinite;
}
@keyframes slowspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Gold particle dots */
.bg-dots {
  position:absolute;inset:0;
  background-image:
    radial-gradient(circle, rgba(184,191,196,0.35) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:0.18;
  mask-image:radial-gradient(ellipse at center, black 0%, transparent 70%);
}

/* Radial glow */
.bg-glow {
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:700px;height:700px;
  background:radial-gradient(ellipse, rgba(184,191,196,0.07) 0%, transparent 65%);
  animation:pulse 6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.1);opacity:0.7}}

/* Top gold bar */
.gold-bar {
  position:absolute;top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* ── LAYOUT ── */
.page {
  position:relative;z-index:1;
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  max-width:1100px;
  margin:0 auto;
  padding:3rem 3rem;
  gap:4rem;
}

/* ── LEFT: PHOTO PANEL ── */
.left {
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}

/* Hexagon frame effect */
.photo-outer {
  position:relative;
  width:280px;height:280px;
  margin-bottom:2rem;
}
.photo-ring-1 {
  position:absolute;inset:-16px;
  border-radius:50%;
  border:1px solid rgba(184,191,196,0.2);
  animation:ringpulse 3s ease-in-out infinite;
}
.photo-ring-2 {
  position:absolute;inset:-32px;
  border-radius:50%;
  border:1px solid rgba(184,191,196,0.08);
  animation:ringpulse 3s ease-in-out infinite 0.5s;
}
@keyframes ringpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.03);opacity:0.6}}

.photo-frame {
  width:280px;height:280px;
  border-radius:50%;
  overflow:hidden;
  border:3px solid var(--gold);
  box-shadow:
    0 0 0 1px rgba(184,191,196,0.3),
    0 20px 60px rgba(0,0,0,0.6),
    0 0 80px rgba(184,191,196,0.12);
  position:relative;z-index:1;
}
.photo-frame img {
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  filter:contrast(1.05) brightness(0.95);
}

/* Medal badge */
.medal-badge {
  display:inline-flex;align-items:center;gap:0.6rem;
  background:linear-gradient(135deg, rgba(184,191,196,0.15), rgba(201,168,76,0.05));
  border:1px solid rgba(184,191,196,0.4);
  padding:0.6rem 1.25rem;
  border-radius:100px;
  font-size:0.75rem;
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--gold);
  backdrop-filter:blur(8px);
}

/* Team GB text watermark left side */
.teamgb-mark {
  position:absolute;
  left:-20px;top:50%;transform:translateY(-50%);
  font-family:'Playfair Display',serif;
  font-size:0.65rem;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:rgba(184,191,196,0.2);
  writing-mode:vertical-rl;
  text-orientation:mixed;
  transform:translateY(-50%) rotate(180deg);
}

/* ── RIGHT: INFO PANEL ── */
.right {
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.eyebrow {
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:1rem;
  display:flex;align-items:center;gap:0.75rem;
}
.eyebrow::before{content:'';display:block;width:28px;height:1px;background:var(--gold);}

.name {
  font-family:'Playfair Display',serif;
  font-size:clamp(2.8rem,4.5vw,4rem);
  font-weight:900;
  line-height:1.0;
  margin-bottom:0.3rem;
  letter-spacing:-0.01em;
}
.name span{color:var(--gold);}

.subtitle {
  font-size:0.85rem;
  font-weight:300;
  letter-spacing:0.1em;
  color:rgba(255,255,255,0.4);
  margin-bottom:2.5rem;
  display:flex;align-items:center;gap:0.75rem;
}
.subtitle .dot{width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:0.5;flex-shrink:0;}

/* Thin gold rule */
.rule{width:48px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:2.5rem;}

/* Links */
.links{display:flex;flex-direction:column;gap:0.9rem;}

.link-btn {
  display:flex;
  align-items:center;
  gap:1rem;
  padding:1rem 1.4rem;
  text-decoration:none;
  border-radius:6px;
  transition:transform 0.2s, box-shadow 0.2s, background 0.2s, border-color 0.2s;
  position:relative;
  overflow:hidden;
}
.link-btn::before {
  content:'';
  position:absolute;left:0;top:0;bottom:0;
  width:3px;
  background:var(--gold);
  transform:scaleY(0);
  transition:transform 0.2s;
  transform-origin:bottom;
}
.link-btn:hover::before{transform:scaleY(1);}
.link-btn:hover{transform:translateX(4px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}

.btn-icon {
  font-size:1.4rem;
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;
  flex-shrink:0;
  transition:background 0.2s;
}
.btn-text{flex:1;}
.btn-title{font-size:0.9rem;font-weight:600;letter-spacing:0.04em;display:block;margin-bottom:0.15rem;}
.btn-desc{font-size:0.72rem;font-weight:400;opacity:0.5;letter-spacing:0.03em;}
.btn-arrow{font-size:1rem;opacity:0.35;transition:opacity 0.2s,transform 0.2s;flex-shrink:0;}
.link-btn:hover .btn-arrow{opacity:0.8;transform:translateX(3px);}

.btn-gold {
  background:linear-gradient(135deg, rgba(184,191,196,0.18), rgba(184,191,196,0.06));
  border:1px solid rgba(184,191,196,0.35);
  color:var(--white);
}
.btn-gold .btn-icon{background:rgba(184,191,196,0.12);}
.btn-gold:hover{background:linear-gradient(135deg, rgba(184,191,196,0.28), rgba(184,191,196,0.1));border-color:rgba(184,191,196,0.6);}

.btn-dark {
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.8);
}
.btn-dark .btn-icon{background:rgba(255,255,255,0.05);}
.btn-dark:hover{background:rgba(255,255,255,0.06);border-color:rgba(184,191,196,0.3);color:var(--white);}

/* Footer */
.footer {
  position:fixed;bottom:1.5rem;left:0;right:0;
  text-align:center;
  font-size:0.65rem;
  letter-spacing:0.12em;
  color:rgba(255,255,255,0.12);
  z-index:1;
}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .page{grid-template-columns:1fr;gap:2.5rem;padding:4rem 1.5rem 3rem;}
  .left{order:1;}
  .right{order:2;}
  .photo-outer{width:200px;height:200px;}
  .photo-frame{width:200px;height:200px;}
  .teamgb-mark{display:none;}
  .name{font-size:2.4rem;}
  .bg-rings{width:320px;}
}
</style>
</head>
